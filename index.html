<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MemeScanner — Solana Alpha</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #050508;
  --bg2: #0a0a10;
  --bg3: #0f0f18;
  --card: #111118;
  --border: #1e1e2e;
  --green: #00ff88;
  --green2: #00cc6a;
  --gold: #ffd700;
  --red: #ff4466;
  --blue: #4488ff;
  --purple: #8855ff;
  --text: #e0e0f0;
  --muted: #6666aa;
  --font-head: 'Syne', sans-serif;
  --font-mono: 'Space Mono', monospace;
  --font: 'Inter', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:var(--font);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:radial-gradient(ellipse at 20% 20%,rgba(0,255,136,.04) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(68,136,255,.03) 0%,transparent 50%);pointer-events:none;z-index:0;}
nav{position:sticky;top:0;z-index:100;background:rgba(5,5,8,.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:0 1.5rem;display:flex;align-items:center;gap:1rem;height:60px;}
.nav-logo{display:flex;align-items:center;gap:.55rem;cursor:pointer;text-decoration:none;flex-shrink:0;}
.nav-logo svg{width:34px;height:34px;flex-shrink:0;filter:drop-shadow(0 0 6px rgba(0,255,136,.45));}
.logo-text{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;color:var(--text);line-height:1.1;}
.logo-text span{color:var(--green);}
.logo-tagline{font-family:'Space Mono',monospace;font-size:7px;color:var(--muted);letter-spacing:.08em;margin-top:1px;}
.nav-links{display:flex;gap:1.2rem;margin-left:2rem;margin-right:auto;}
.nav-links a{color:var(--muted);font-size:.85rem;text-decoration:none;transition:.2s;font-weight:500;}
.nav-links a:hover{color:var(--green);}
.nav-btn{padding:.4rem 1rem;border-radius:6px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:.2s;font-family:var(--font);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-outline:hover{border-color:var(--green);color:var(--green);}
.btn-primary{background:var(--green);color:#000;}
.btn-primary:hover{background:var(--green2);}
.lang-switch{background:transparent;border:1px solid var(--border);color:var(--muted);padding:.35rem .7rem;border-radius:6px;cursor:pointer;font-size:.78rem;font-family:var(--font);}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:center;padding:5rem 4rem 4rem;max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.hero-title{font-family:var(--font-head);font-size:3.2rem;line-height:1.1;margin-bottom:1rem;}
.hero-title span{color:var(--green);}
.hero-subtitle{color:var(--muted);font-size:1rem;line-height:1.6;margin-bottom:2rem;}
.hero-stats{display:flex;gap:2rem;margin-bottom:2rem;}
.stat-item{text-align:center;}
.stat-num{font-family:var(--font-mono);font-size:1.4rem;color:var(--green);font-weight:700;}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;}
.hero-cta{display:flex;gap:1rem;}
.cta-big{padding:.8rem 2rem;border-radius:8px;font-size:.95rem;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:.2s;}
.cta-green{background:var(--green);color:#000;}
.cta-green:hover{background:var(--green2);transform:translateY(-1px);}
.cta-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.cta-ghost:hover{border-color:var(--green);color:var(--green);}
.hero-demo{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;position:relative;overflow:hidden;}
.hero-demo::before{content:'LIVE DEMO';position:absolute;top:10px;right:10px;font-size:.65rem;color:var(--green);background:rgba(0,255,136,.1);padding:.2rem .5rem;border-radius:4px;font-family:var(--font-mono);}
.demo-header{font-size:.7rem;color:var(--muted);font-family:var(--font-mono);margin-bottom:.8rem;text-transform:uppercase;letter-spacing:.08em;}
.demo-token{display:flex;align-items:center;justify-content:space-between;padding:.6rem .8rem;background:var(--bg3);border-radius:8px;margin-bottom:.5rem;border:1px solid var(--border);}
.demo-token.rug{opacity:.5;border-color:rgba(255,68,102,.3);text-decoration:line-through;}
.demo-tok-name{font-family:var(--font-mono);font-size:.8rem;color:var(--text);}
.demo-score{font-size:.72rem;font-weight:700;padding:.2rem .5rem;border-radius:4px;}
.score-god{background:rgba(255,215,0,.15);color:var(--gold);}
.score-high{background:rgba(0,255,136,.12);color:var(--green);}
.demo-reject{font-size:.65rem;color:var(--red);}
.tools-section{padding:4rem;max-width:1200px;margin:0 auto;position:relative;z-index:1;}
.section-title{font-family:var(--font-head);font-size:1.8rem;margin-bottom:.5rem;}
.section-sub{color:var(--muted);font-size:.9rem;margin-bottom:2.5rem;}
.tools-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:1.5rem;}
.tool-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.8rem;cursor:pointer;transition:.3s;position:relative;overflow:hidden;}
.tool-card:hover{border-color:var(--green);transform:translateY(-3px);box-shadow:0 8px 30px rgba(0,255,136,.08);}
.tool-icon{font-size:2rem;margin-bottom:.8rem;}
.tool-name{font-family:var(--font-head);font-size:1.1rem;margin-bottom:.4rem;}
.tool-desc{color:var(--muted);font-size:.85rem;line-height:1.5;}
.tool-badge{position:absolute;top:1rem;right:1rem;font-size:.65rem;padding:.2rem .5rem;border-radius:4px;font-family:var(--font-mono);background:rgba(0,255,136,.1);color:var(--green);}
.scanner-section{padding:4rem;max-width:1400px;margin:0 auto;position:relative;z-index:1;}
.scanner-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;flex-wrap:wrap;gap:1rem;}
.scanner-title{font-family:var(--font-head);font-size:1.6rem;}
.scanner-controls{display:flex;gap:.8rem;align-items:center;}
.scan-btn{padding:.5rem 1.2rem;border-radius:8px;font-size:.82rem;font-weight:600;cursor:pointer;border:none;font-family:var(--font);transition:.2s;}
.scan-btn-green{background:var(--green);color:#000;}
.scan-btn-green:hover{background:var(--green2);}
.scan-btn-outline{background:transparent;border:1px solid var(--border);color:var(--muted);}
.scan-btn-outline:hover{border-color:var(--green);color:var(--green);}
.status-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.token-table{width:100%;border-collapse:collapse;}
.token-table th{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.07em;padding:.8rem 1rem;text-align:left;border-bottom:1px solid var(--border);font-weight:500;}
.token-table td{padding:.9rem 1rem;border-bottom:1px solid rgba(30,30,46,.6);vertical-align:middle;}
.token-table tr:hover td{background:rgba(255,255,255,.02);}
.tok-name-cell{display:flex;align-items:center;gap:.6rem;}
.tok-emoji{font-size:1.1rem;}
.tok-sym{font-family:var(--font-mono);font-size:.9rem;font-weight:700;}
.tok-addr{font-size:.65rem;color:var(--muted);}
.score-badge{display:inline-flex;align-items:center;gap:.3rem;padding:.3rem .7rem;border-radius:6px;font-size:.78rem;font-weight:700;font-family:var(--font-mono);}
.score-god-gem{background:rgba(255,215,0,.12);color:var(--gold);border:1px solid rgba(255,215,0,.2);}
.score-high-pot{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.15);}
.score-solid{background:rgba(68,136,255,.1);color:var(--blue);border:1px solid rgba(68,136,255,.15);}
.mcap-cell{font-family:var(--font-mono);font-size:.8rem;}
.mcap-call{color:var(--muted);font-size:.72rem;}
.mcap-now{color:var(--text);font-weight:600;}
.mcap-mult{font-size:.7rem;}
.mcap-mult.up{color:var(--green);}
.mcap-mult.down{color:var(--red);}
.ath-val{font-family:var(--font-mono);font-size:.78rem;color:var(--gold);}
.fees-cell{font-family:var(--font-mono);font-size:.78rem;}
.rug-badge{padding:.25rem .6rem;border-radius:5px;font-size:.68rem;font-weight:700;font-family:var(--font-mono);letter-spacing:.03em;}
.rug-low{background:rgba(0,255,136,.1);color:var(--green);border:1px solid rgba(0,255,136,.15);}
.rug-med{background:rgba(255,170,0,.1);color:#ffaa00;border:1px solid rgba(255,170,0,.2);}
.rug-high{background:rgba(255,68,102,.1);color:var(--red);border:1px solid rgba(255,68,102,.15);}
.breakdown-mini{display:flex;gap:.3rem;margin-top:.3rem;flex-wrap:wrap;}
.bk-chip{font-size:.6rem;color:var(--muted);background:var(--bg3);padding:.1rem .35rem;border-radius:3px;font-family:var(--font-mono);}
.time-ago{font-size:.7rem;color:var(--muted);font-family:var(--font-mono);}
.empty-state{text-align:center;padding:4rem 2rem;}
.empty-icon{font-size:3rem;margin-bottom:1rem;opacity:.5;}
.empty-title{font-family:var(--font-mono);font-size:.9rem;color:var(--muted);}
.empty-sub{font-size:.78rem;color:var(--muted);opacity:.7;margin-top:.4rem;}
.loading-state{text-align:center;padding:4rem 2rem;}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg)}}
.pricing-section{padding:4rem;max-width:1100px;margin:0 auto;position:relative;z-index:1;}
.pricing-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.5rem;margin-top:2.5rem;}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:2rem;position:relative;transition:.3s;}
.plan-card:hover{transform:translateY(-4px);}
.plan-card.featured{border-color:var(--green);box-shadow:0 0 30px rgba(0,255,136,.08);}
.plan-card.dubai{border-color:var(--gold);box-shadow:0 0 30px rgba(255,215,0,.08);}
.plan-badge{position:absolute;top:-12px;left:50%;transform:translateX(-50%);padding:.3rem 1rem;border-radius:20px;font-size:.7rem;font-weight:700;white-space:nowrap;}
.badge-pop{background:var(--green);color:#000;}
.badge-top{background:var(--gold);color:#000;}
.plan-name{font-family:var(--font-head);font-size:1.3rem;margin-bottom:.2rem;}
.plan-tagline{font-size:.78rem;color:var(--muted);margin-bottom:1.2rem;}
.plan-price{font-family:var(--font-mono);font-size:2.2rem;font-weight:700;margin-bottom:1.5rem;}
.plan-price span{font-size:.9rem;color:var(--muted);font-weight:400;}
.plan-features{list-style:none;display:flex;flex-direction:column;gap:.7rem;margin-bottom:1.8rem;}
.plan-features li{font-size:.84rem;display:flex;align-items:center;gap:.5rem;}
.feat-yes{color:var(--green);}
.feat-no{color:var(--muted);opacity:.5;}
.plan-btn{width:100%;padding:.8rem;border-radius:8px;font-size:.88rem;font-weight:700;cursor:pointer;border:none;font-family:var(--font);transition:.2s;}
.plan-btn-green{background:var(--green);color:#000;}
.plan-btn-green:hover{background:var(--green2);}
.plan-btn-gold{background:var(--gold);color:#000;}
.plan-btn-gold:hover{filter:brightness(.9);}
.plan-btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.plan-btn-ghost:hover{border-color:var(--green);color:var(--green);}
.reviews-section{padding:4rem;max-width:1100px;margin:0 auto;position:relative;z-index:1;}
.reviews-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1.2rem;margin-top:2rem;}
.review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;}
.review-stars{color:var(--gold);font-size:.9rem;margin-bottom:.6rem;}
.review-text{font-size:.84rem;color:var(--muted);line-height:1.5;margin-bottom:.8rem;font-style:italic;}
.review-author{font-size:.75rem;font-family:var(--font-mono);color:var(--text);}
.review-form{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.4rem;margin-top:1.2rem;}
.review-form h3{font-size:.9rem;font-family:var(--font-head);margin-bottom:.8rem;}
.star-picker{display:flex;gap:.3rem;font-size:1.4rem;cursor:pointer;margin-bottom:.8rem;}
.star-picker span{opacity:.4;transition:.1s;}
.star-picker span.active{opacity:1;}
.rev-input{width:100%;background:var(--bg3);border:1px solid var(--border);border-radius:8px;padding:.7rem;color:var(--text);font-family:var(--font);font-size:.84rem;resize:vertical;min-height:80px;margin-bottom:.8rem;}
.rev-input:focus{outline:none;border-color:var(--green);}
.rev-submit{padding:.5rem 1.2rem;background:var(--green);color:#000;border:none;border-radius:6px;font-weight:700;cursor:pointer;font-family:var(--font);font-size:.82rem;}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.modal-overlay.open{opacity:1;pointer-events:all;}
.modal-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2.5rem;width:90%;max-width:440px;position:relative;transform:scale(.96);transition:.3s;}
.modal-overlay.open .modal-box{transform:scale(1);}
.modal-close{position:absolute;top:1rem;right:1rem;background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.2rem;}
.modal-close:hover{color:var(--text);}
.modal-title{font-family:var(--font-head);font-size:1.4rem;margin-bottom:.4rem;}
.modal-sub{color:var(--muted);font-size:.84rem;margin-bottom:1.5rem;}
.code-input{width:100%;background:var(--bg3);border:2px solid var(--border);border-radius:10px;padding:.9rem 1.2rem;color:var(--text);font-family:var(--font-mono);font-size:1.1rem;letter-spacing:.1em;text-align:center;text-transform:uppercase;}
.code-input:focus{outline:none;border-color:var(--green);}
.code-input.err{border-color:var(--red);}
.code-err{color:var(--red);font-size:.78rem;margin:.6rem 0;text-align:center;}
.code-submit{width:100%;padding:.8rem;background:var(--green);color:#000;border:none;border-radius:8px;font-weight:700;font-size:.95rem;cursor:pointer;font-family:var(--font);transition:.2s;margin-top:.6rem;}
.code-submit:hover{background:var(--green2);}
.admin-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:2000;align-items:center;justify-content:center;backdrop-filter:blur(10px);}
.admin-overlay.open{display:flex;}
.admin-panel{background:#080810;border:1px solid rgba(0,255,136,.15);border-radius:16px;padding:36px;max-width:580px;width:92%;max-height:88vh;overflow-y:auto;position:relative;}
.admin-panel::-webkit-scrollbar{width:3px;}
.admin-panel::-webkit-scrollbar-thumb{background:var(--green);border-radius:2px;}
.admin-title{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--green);letter-spacing:-1px;margin-bottom:3px;}
.admin-sub{font-family:'Space Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:24px;}
.admin-section{margin-bottom:24px;}
.admin-section-title{font-family:'Space Mono',monospace;font-size:9px;color:var(--green);text-transform:uppercase;letter-spacing:2px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.admin-row{display:flex;gap:8px;align-items:center;}
.admin-inp{flex:1;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:9px 12px;font-family:'Space Mono',monospace;font-size:11px;color:var(--green);outline:none;transition:border .2s;}
.admin-inp:focus{border-color:var(--green);}
.btn-admin{background:var(--green);color:#000;border:none;padding:9px 16px;font-family:'Space Mono',monospace;font-size:10px;font-weight:700;border-radius:6px;cursor:pointer;transition:all .2s;white-space:nowrap;}
.btn-admin:hover{background:#fff;}
.btn-admin.red{background:var(--red);color:#fff;}
.btn-admin.red:hover{background:#ff6b78;}
.btn-admin.ghost{background:transparent;border:1px solid var(--border);color:var(--muted);}
.btn-admin.ghost:hover{border-color:var(--green);color:var(--green);background:transparent;}
.admin-msg{font-family:'Space Mono',monospace;font-size:9px;margin-top:8px;display:none;}
.admin-msg.ok{color:var(--green);}
.admin-msg.err{color:var(--red);}
.codes-list{display:flex;flex-direction:column;gap:5px;max-height:220px;overflow-y:auto;}
.codes-list::-webkit-scrollbar{width:2px;}
.codes-list::-webkit-scrollbar-thumb{background:var(--green);}
.code-item{display:flex;align-items:center;justify-content:space-between;background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.1);border-radius:6px;padding:8px 12px;}
.code-item.used{background:rgba(255,45,85,.04);border-color:rgba(255,45,85,.15);}
.code-val{font-family:'Space Mono',monospace;font-size:11px;color:var(--green);letter-spacing:1px;}
.code-item.used .code-val{color:var(--muted);}
.code-meta{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px;}
.code-meta.u{color:var(--red);}
.code-actions{display:flex;gap:5px;}
.btn-cc,.btn-del{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Space Mono',monospace;font-size:8px;padding:3px 7px;border-radius:3px;cursor:pointer;transition:all .15s;}
.btn-cc:hover{border-color:var(--green);color:var(--green);}
.btn-del:hover{border-color:var(--red);color:var(--red);}
.admin-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;}
.admin-stat{background:rgba(0,255,136,.04);border:1px solid rgba(0,255,136,.15);border-radius:6px;padding:12px;text-align:center;}
.admin-stat-val{font-family:'Syne',sans-serif;font-size:26px;font-weight:800;color:var(--green);}
.admin-stat-lbl{font-family:'Space Mono',monospace;font-size:8px;color:var(--muted);margin-top:2px;}
.pw-input{width:100%;background:rgba(0,0,0,.4);border:1px solid var(--border);border-radius:6px;padding:.6rem .9rem;color:var(--text);font-family:var(--font-mono);font-size:.9rem;margin-bottom:.8rem;}
.pw-input:focus{outline:none;border-color:var(--green);}
.admin-pw-err{color:var(--red);font-size:.78rem;margin-bottom:.6rem;}
.debug-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);z-index:300;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:.3s;}
.debug-overlay.open{opacity:1;pointer-events:all;}
.debug-box{background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:2rem;width:90%;max-width:620px;max-height:85vh;overflow-y:auto;position:relative;}
.debug-title{font-family:var(--font-mono);font-size:.9rem;color:var(--green);margin-bottom:1.2rem;}
.debug-score-big{font-family:var(--font-head);font-size:3rem;text-align:center;margin-bottom:1.2rem;}
.debug-bars{display:flex;flex-direction:column;gap:.8rem;margin-bottom:1.5rem;}
.debug-bar-row{display:flex;align-items:center;gap:.8rem;}
.debug-bar-label{font-family:var(--font-mono);font-size:.72rem;color:var(--muted);width:80px;}
.debug-bar-track{flex:1;background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;}
.debug-bar-fill{height:100%;border-radius:4px;background:var(--green);transition:.5s;}
.debug-bar-val{font-family:var(--font-mono);font-size:.72rem;color:var(--text);width:50px;text-align:right;}
.debug-details{font-size:.75rem;font-family:var(--font-mono);color:var(--muted);background:var(--bg3);padding:1rem;border-radius:8px;line-height:1.8;white-space:pre-wrap;}
.debug-raw{font-size:.7rem;color:var(--muted);background:var(--bg3);padding:.8rem;border-radius:6px;line-height:1.6;max-height:200px;overflow-y:auto;white-space:pre-wrap;margin-top:1rem;}
.debug-raw summary{color:var(--muted);cursor:pointer;font-family:var(--font-mono);font-size:.72rem;margin-bottom:.4rem;}
footer{border-top:1px solid var(--border);padding:2rem 4rem;display:flex;align-items:center;justify-content:space-between;position:relative;z-index:1;}
.footer-left{font-size:.78rem;color:var(--muted);}
.footer-links{display:flex;gap:1.5rem;}
.footer-links a{font-size:.78rem;color:var(--muted);text-decoration:none;transition:.2s;}
.footer-links a:hover{color:var(--green);}
.floater{position:fixed;pointer-events:no
